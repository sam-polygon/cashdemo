<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash App × Polygon — Interactive Demo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00C244;
  --g2: #1DB954;
  --poly: #7B3FE4;
  --bg: #000;
  --card: #1C1C1E;
  --card2: #2C2C2E;
  --card3: #3A3A3C;
  --txt: #fff;
  --txt2: #8E8E93;
  --txt3: #636366;
  --line: rgba(255,255,255,0.08);
  --ob: #111;
  --ot: #ccc;
  --om: #555;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;background:var(--ob);color:var(--ot);line-height:1.4;}

/* topbar */
.tb{background:#0d0d0d;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 44px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.tb-t{font-size:14px;font-weight:600;color:var(--ot);letter-spacing:-0.2px;}
.tb-s{font-size:10px;color:var(--om);letter-spacing:1.5px;text-transform:uppercase;}

/* page */
.page{max-width:1240px;margin:0 auto;padding:48px 44px 80px;}
.grid{display:grid;grid-template-columns:300px 1fr;gap:64px;align-items:start;}

/* phone */
.pcol{position:sticky;top:32px;}
.pshell{width:282px;background:#1a1a1a;border-radius:48px;padding:10px;margin:0 auto;box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 40px 80px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.08);}
.pscr{background:#000;border-radius:40px;overflow:hidden;aspect-ratio:390/844;position:relative;display:flex;flex-direction:column;}
.pnotch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:96px;height:24px;background:#1a1a1a;border-radius:12px;z-index:20;}
.pstat{display:flex;justify-content:space-between;padding:14px 20px 2px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);position:relative;z-index:5;flex-shrink:0;}
.pbody{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* dots */
.dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;padding:14px 4px 0;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.12);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.dot.active{background:var(--g);transform:scale(1.3);}
.dot.done{background:rgba(0,194,68,0.4);}

/* narrative */
.narr{padding-top:2px;}
.stag{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);padding:5px 13px 5px 8px;border-radius:100px;font-size:11px;font-weight:600;color:var(--om);letter-spacing:0.3px;margin-bottom:18px;text-transform:uppercase;}
.stagd{width:7px;height:7px;border-radius:50%;background:var(--g);}
.narr h1{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.8px;line-height:1.12;margin-bottom:14px;}
.narr h1 em{font-style:normal;color:var(--g);}
.narr h1 .pe{font-style:normal;color:#A78BFA;}
.nbody{font-size:14px;color:#999;line-height:1.65;margin-bottom:22px;max-width:500px;}
.nbody strong{color:#ddd;font-weight:600;}
.nbody em{font-style:normal;color:var(--g);font-weight:600;}

/* poly card */
.pc{background:rgba(123,63,228,0.06);border:1px solid rgba(123,63,228,0.18);border-radius:12px;padding:14px 16px;margin-bottom:20px;max-width:500px;}
.pcl{font-size:9px;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.phx{width:15px;height:15px;background:var(--poly);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:800;}
.pct{font-size:12.5px;color:#C4B5FD;line-height:1.55;}
.pct strong{color:#DDD6FE;font-weight:600;}

/* bullets */
.bul{list-style:none;max-width:500px;}
.bul li{font-size:12.5px;color:#888;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:flex-start;gap:9px;line-height:1.5;}
.bul li:last-child{border-bottom:none;}
.bul li::before{content:'→';color:var(--g);font-weight:700;flex-shrink:0;margin-top:1px;font-size:11px;}
.bul li strong{color:#ccc;font-weight:600;}

/* controls */
.ctrls{display:flex;justify-content:space-between;align-items:center;margin-top:28px;max-width:500px;}
.cb{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;color:#ddd;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.cb:hover:not(:disabled){background:rgba(255,255,255,0.09);}
.cb.p{background:var(--g);color:#000;border-color:var(--g);}
.cb.p:hover:not(:disabled){background:#00a83a;}
.cb:disabled{opacity:0.25;cursor:not-allowed;}
.creset{background:none;border:none;color:var(--om);font-size:12px;cursor:pointer;font-family:inherit;}

/* ── PHONE UI COMPONENTS ── */
.s{background:#000;flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* The real home screen — matches images 10/11 exactly */
.home-wrap{flex:1;display:flex;flex-direction:column;background:#000;overflow:hidden;}
.home-topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 8px;flex-shrink:0;}
.hta-left{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:17px;}
.hta-right{display:flex;gap:8px;}
.hta-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px;}
.home-card-strip{background:var(--card);border-radius:14px;padding:10px 14px;margin:0 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hcs-left{display:flex;align-items:center;gap:8px;}
.hcs-card-icon{font-size:12px;color:var(--txt2);}
.hcs-num{font-size:13px;color:var(--txt2);font-family:'DM Mono',monospace;}
.hcs-tag{font-size:13px;color:var(--txt2);font-weight:500;}
.home-bal-area{padding:4px 18px 12px;flex-shrink:0;}
.hba-label{font-size:14px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.hba-label .ch{color:var(--txt2);font-size:13px;}
.hba-eye{margin-left:auto;font-size:17px;color:var(--txt2);}
.hba-amt{font-size:52px;font-weight:800;color:#fff;letter-spacing:-2.5px;line-height:1;}
.home-actions{display:flex;gap:10px;padding:0 18px 10px;flex-shrink:0;}
.ha-btn{flex:1;background:var(--card);border-radius:100px;padding:13px;text-align:center;font-size:15px;font-weight:700;color:white;}
.home-scroll{flex:1;overflow-y:auto;padding:0 16px 8px;}
.home-scroll::-webkit-scrollbar{display:none;}

/* stacked feature cards (like savings, bitcoin in image 11) */
.hfc{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;}
.hfc-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.hfc-name{font-size:14px;font-weight:600;color:var(--txt);}
.hfc-right-icon{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;}
.hfc-amt{font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.8px;margin:2px 0;}
.hfc-sub{font-size:12px;color:var(--txt2);}

/* green status bar */
.hfc-green{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.hfc-green-left{display:flex;align-items:center;gap:10px;}
.hfc-green-icon{width:18px;height:18px;background:var(--g);border-radius:4px;}
.hfc-green-name{font-size:14px;font-weight:600;color:var(--txt);}
.hfc-green-right{font-size:13px;color:var(--txt2);font-weight:500;}

/* bottom nav — real Cash App: balance pill + $ + clock */
.bnav{background:rgba(0,0,0,0.95);border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:8px 20px 14px;flex-shrink:0;gap:0;}
.bnt{flex:1;display:flex;justify-content:center;}
.bnt-pill{background:var(--card2);border-radius:100px;padding:7px 14px;font-size:13px;font-weight:700;color:#fff;display:inline-flex;align-items:center;justify-content:center;}
.bnt-pill.active{background:var(--card3);}
.bnt-icon{font-size:20px;color:var(--txt2);}
.bnt-icon.active{color:#fff;}

/* ── PAY SCREEN — exact green + black sheet ── */
.pay-bg{background:#1a5c2a;flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.pay-bg-inner{background:var(--g);flex:1;display:flex;flex-direction:column;}
.pay-topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 8px;flex-shrink:0;}
.pay-smiley{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;font-size:15px;}
.pay-icons{display:flex;gap:8px;}
.pay-icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;font-size:14px;}
.pay-amt{flex:1;display:flex;align-items:center;justify-content:center;font-size:72px;font-weight:900;color:#000;letter-spacing:-4px;line-height:1;}
.pay-numpad{display:grid;grid-template-columns:repeat(3,1fr);padding:0 16px;flex-shrink:0;}
.pay-key{height:52px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:400;color:rgba(0,0,0,0.75);}
.pay-btns{display:flex;gap:10px;padding:8px 16px 4px;flex-shrink:0;}
.pay-sec{flex:1;background:rgba(0,0,0,0.12);border-radius:100px;padding:11px;text-align:center;font-size:14px;font-weight:700;color:rgba(0,0,0,0.75);}
.pay-main{background:#000;border-radius:100px;padding:14px;text-align:center;font-size:16px;font-weight:700;color:var(--g);margin:4px 16px 8px;flex-shrink:0;}

/* pay-to black sheet that slides up */
.pay-sheet{background:#111;border-radius:20px 20px 0 0;flex-shrink:0;padding:0 20px 12px;}
.psh-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:8px auto 14px;}
.psh-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:15px;color:rgba(255,255,255,0.7);margin-bottom:12px;}
.psh-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.8px;margin-bottom:14px;line-height:1.1;}
.psh-title .dim{color:var(--txt2);font-weight:400;}
.psh-search{background:var(--card);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--txt2);display:flex;align-items:center;gap:8px;margin-bottom:12px;}

/* send confirm sheet */
.send-sheet{background:#111;border-radius:20px 20px 0 0;flex-shrink:0;padding:0 20px 16px;}
.ss-back{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-top:4px;}
.ss-back-btn{font-size:22px;color:#fff;}
.ss-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.8px;line-height:1.2;margin-bottom:16px;}
.ss-title .dim{color:var(--txt2);font-weight:400;}
.ss-addr{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.ss-addr-icon{width:36px;height:36px;border-radius:50%;background:var(--poly);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ss-addr-txt{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.ss-coin{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.ss-coin-icon{width:36px;height:36px;border-radius:50%;background:#2775CA;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ss-coin-txt{font-size:22px;font-weight:800;color:#fff;}
.ss-detail{font-size:14px;color:#fff;margin-bottom:6px;}
.ss-detail span{color:var(--txt2);}
.ss-bal{background:var(--card);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px;}
.ss-bal-left{display:flex;align-items:center;gap:10px;}
.ss-bal-icon{width:28px;height:28px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;}
.ss-bal-txt{font-size:15px;font-weight:600;color:#fff;}
.ss-bal-val{font-size:15px;color:var(--txt2);}
.ss-bal-chev{font-size:14px;color:var(--txt2);}
.ss-disclaimer{font-size:11px;color:var(--txt2);text-align:center;margin-bottom:10px;}
.ss-disclaimer a{color:var(--txt2);text-decoration:underline;}
.ss-send{background:#fff;border-radius:100px;padding:15px;text-align:center;font-size:16px;font-weight:700;color:#000;}

/* network select sheet */
.net-sheet{background:#111;border-radius:20px 20px 0 0;flex-shrink:0;padding:0 20px 16px;}
.net-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.8px;margin-bottom:16px;}
.net-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);}
.net-item:last-child{border-bottom:none;}
.net-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.net-name{font-size:16px;font-weight:600;color:#fff;}
.net-addr{font-size:12px;color:var(--txt2);margin-top:1px;font-family:'DM Mono',monospace;}

/* deposit USDC QR screen */
.qr-screen{background:#000;flex:1;display:flex;flex-direction:column;overflow:hidden;}
.qr-topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;flex-shrink:0;}
.qr-close{width:32px;height:32px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:15px;color:rgba(255,255,255,0.7);}
.qr-title{font-size:16px;font-weight:700;color:#fff;}
.qr-help{width:32px;height:32px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:15px;color:rgba(255,255,255,0.7);}
.qr-box{background:#fff;border-radius:16px;margin:0 20px 14px;padding:16px;position:relative;flex-shrink:0;}
.qr-svg{width:100%;aspect-ratio:1;position:relative;}
.qr-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.qr-grid{display:grid;grid-template-columns:repeat(20,1fr);gap:1.5px;width:100%;}
.qr-cell{aspect-ratio:1;border-radius:1px;}
.qr-caption{font-size:14px;color:rgba(255,255,255,0.85);text-align:center;margin-bottom:12px;flex-shrink:0;}
.qr-network{background:var(--card);border-radius:100px;padding:7px 16px;display:inline-flex;align-items:center;gap:6px;margin:0 auto 14px;font-size:13px;font-weight:700;color:#fff;display:flex;justify-content:center;flex-shrink:0;}
.qr-warning{font-size:10px;color:var(--txt2);text-align:center;line-height:1.5;padding:0 20px 12px;flex-shrink:0;}
.qr-btns{display:flex;gap:12px;padding:0 20px 12px;flex-shrink:0;}
.qr-btn{flex:1;background:#fff;border-radius:100px;padding:13px;text-align:center;font-size:15px;font-weight:600;color:#000;}

/* add money screen */
.addmoney-bg{background:#000;flex:1;display:flex;flex-direction:column;overflow:hidden;}
.am-topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 6px;flex-shrink:0;}
.am-topbar-inner{flex:1;display:flex;align-items:center;justify-content:space-between;}
.am-bal-area{padding:4px 18px 10px;flex-shrink:0;}
.am-list-section{padding:8px 18px 0;flex:1;overflow-y:auto;}
.am-section-hdr{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:12px;}
.am-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid rgba(255,255,255,0.07);}
.am-row:last-child{border-bottom:none;}
.am-row.highlight{background:rgba(0,194,68,0.06);border-radius:12px;padding:13px 10px;margin:0 -10px 6px;}
.am-left{display:flex;align-items:center;gap:14px;}
.am-icon{font-size:20px;width:24px;text-align:center;flex-shrink:0;}
.am-icon.poly-icon{color:var(--poly);}
.am-name{font-size:16px;font-weight:500;color:#fff;}
.am-name.poly{color:var(--g);font-weight:600;}
.am-chev{font-size:16px;color:var(--txt2);}

/* add money sheet (from image 10) */
.am-sheet{background:#111;border-radius:20px 20px 0 0;flex-shrink:0;padding:0 16px 14px;}
.am-sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:8px auto 12px;}
.am-sheet-title{font-size:22px;font-weight:800;color:#fff;text-align:center;letter-spacing:-0.5px;margin-bottom:4px;}
.am-sheet-sub{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:14px;}
.am-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.am-amt{background:var(--card);border-radius:14px;padding:16px;text-align:center;font-size:17px;font-weight:700;color:#fff;}
.am-from{background:var(--card);border-radius:14px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.am-from-left{display:flex;align-items:center;gap:10px;}
.am-from-card{width:36px;height:24px;background:linear-gradient(135deg,#c8102e,#c8102e);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:white;}
.am-from-txt{font-size:14px;font-weight:500;color:#fff;}
.am-from-chev{font-size:14px;color:var(--txt2);}
.am-add-btn{background:var(--card2);border-radius:100px;padding:14px;text-align:center;font-size:16px;font-weight:700;color:var(--txt2);}
.am-add-btn.green{background:var(--g);color:#000;}

/* withdrawal / confirm screen */
.wd-screen{background:#000;flex:1;display:flex;flex-direction:column;overflow:hidden;}
.wd-close{width:32px;height:32px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,0.7);margin:10px 18px 20px;}
.wd-check{width:52px;height:52px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#000;margin:0 18px 16px;}
.wd-title{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.8px;margin:0 18px 8px;}
.wd-sub{font-size:16px;color:var(--txt2);margin:0 18px;flex:1;}
.wd-done{background:#fff;border-radius:100px;padding:15px;text-align:center;font-size:16px;font-weight:700;color:#000;margin:0 16px 14px;}

/* savings screen */
.savings-wrap{flex:1;display:flex;flex-direction:column;background:#000;overflow:hidden;}
.sw-hdr{display:flex;align-items:center;padding:8px 18px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
.sw-back{width:32px;height:32px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,0.7);}
.sw-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff;margin-right:32px;}
.sw-body{flex:1;overflow-y:auto;padding:14px 18px;}
.sw-body::-webkit-scrollbar{display:none;}
.sw-badge{background:rgba(0,194,68,0.15);border-radius:100px;padding:5px 12px;display:inline-block;font-size:12px;font-weight:700;color:var(--g);margin-bottom:10px;}
.sw-rate{font-size:48px;font-weight:800;color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
.sw-lbl{font-size:14px;color:var(--txt2);margin-bottom:6px;}
.sw-earned{font-size:13px;color:var(--g);font-weight:600;margin-bottom:12px;}
.sw-progress{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:4px;overflow:hidden;}
.sw-prog-fill{height:100%;border-radius:2px;background:var(--g);}
.sw-prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:14px;}
.sw-card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;}
.sw-stat-row{display:flex;gap:10px;margin-bottom:10px;}
.sw-stat{flex:1;background:var(--card);border-radius:12px;padding:12px;}
.sw-stat-l{font-size:11px;color:var(--txt2);margin-bottom:3px;}
.sw-stat-v{font-size:16px;font-weight:700;color:#fff;}
.sw-stat-v.g{color:var(--g);}

/* borrow screen */

// QR grid generator — makes a realistic-looking QR pattern
function qrGrid(){
  const cells=[];
  const corners=[[0,0],[0,14],[14,0]]; // corner positions (simplified)
  for(let r=0;r<20;r++){
    for(let c=0;c<20;c++){
      const isCorn=(r<5&&c<5)||(r<5&&c>14)||(r>14&&c<5);

      const rand=Math.random()>0.5;
      const on=isCorn||rand;
      cells.push(`<div class="qr-cell" style="background:${on?'#000':'transparent'};"></div>`);
    }
  }
  return cells.join('');
}

const N=STEPS.length;
function buildDots(){const el=document.getElementById('dots');el.innerHTML='';STEPS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<cur?' done':'')+(i===cur?' active':'');d.onclick=()=>{cur=i;render();};el.appendChild(d);});}
function render(){
  const s=STEPS[cur];
  document.getElementById('stagx').textContent=s.tag;
  document.getElementById('stitle').innerHTML=s.title;
  document.getElementById('nbody').innerHTML=s.body;
  document.getElementById('plbl').textContent=s.plbl;
  document.getElementById('ptxt').innerHTML=s.ptxt;
  document.getElementById('sbul').innerHTML=s.bul.map(b=>`<li>${b}</li>`).join('');
  document.getElementById('pbody').innerHTML=SCR[s.scr]();
  document.getElementById('pbtn').disabled=cur===0;
  document.getElementById('nbtn').disabled=cur===N-1;
  document.getElementById('nbtn').textContent=cur===N-1?'Done':'Next →';
  buildDots();
  if(s.scr==='bridge')setTimeout(()=>animSteps('bridge-steps'),200);
}
function animSteps(id){
  const c=document.getElementById(id);if(!c)return;
  const items=c.querySelectorAll('.pstep');
  items.forEach((item,i)=>{setTimeout(()=>{if(i>0){items[i-1].classList.remove('active');items[i-1].classList.add('done');}item.classList.add('active');},i*750);});
  setTimeout(()=>{items[items.length-1].classList.remove('active');items[items.length-1].classList.add('done');},items.length*750);
}
document.getElementById('nbtn').addEventListener('click',()=>{if(cur<N-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}});
document.getElementById('pbtn').addEventListener('click',()=>{if(cur>0){cur--;render();}});
document.getElementById('rbtn').addEventListener('click',()=>{cur=0;render();window.scrollTo({top:0,behavior:'smooth'});});
render();
</script>
</body>
</html>
