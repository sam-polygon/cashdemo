<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash App × Polygon — Interactive Demo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ca: #00D64F;
  --ca2: #00B844;
  --ca3: rgba(0,214,79,0.12);
  --poly: #7B3FE4;
  --poly2: rgba(123,63,228,0.15);
  --ink: #080B08;
  --ink2: #111511;
  --ink3: #1C211C;
  --muted: #5A6A5A;
  --muted2: #8A9A8A;
  --line: rgba(255,255,255,0.07);
  --line2: rgba(255,255,255,0.04);
  --text: #E4EEE4;
  --text2: #8FA08F;
  --white: #FFFFFF;
  --blue: #3B82F6;
  --amber: #F59E0B;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body { font-family: 'Outfit', system-ui, sans-serif; background: var(--ink); color: var(--text); line-height: 1.5; }

/* ── BANNER ── */
.banner {
  background: var(--ink2);
  border-bottom: 1px solid var(--line);
  padding: 18px 48px;
  display: flex; justify-content: space-between; align-items: center;
}
.banner-left { display: flex; align-items: center; gap: 12px; }
.logo-ca {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--ca); display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: var(--ink); letter-spacing: -1px;
}
.logo-poly {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--poly); display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: white;
}
.banner-x { color: var(--muted); font-size: 18px; font-weight: 300; }
.banner-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; margin-left: 4px; }
.banner-tag { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

/* ── PAGE WRAP ── */
.page-wrap { max-width: 1260px; margin: 0 auto; padding: 52px 48px 80px; }
.demo-grid {
  display: grid;
  grid-template-columns: 310px 1fr;
  gap: 72px;
  align-items: start;
}

/* ── PHONE ── */
.phone-wrap { position: sticky; top: 36px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.phone {
  width: 292px;
  background: #0d0d0d;
  border-radius: 46px;
  padding: 10px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    0 48px 96px rgba(0,0,0,0.7),
    0 0 80px rgba(0,214,79,0.03);
}
.phone-screen {
  background: #000;
  border-radius: 38px;
  overflow: hidden;
  aspect-ratio: 9/19.5;
  display: flex;
  flex-direction: column;
  position: relative;
}
.phone-notch {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 88px; height: 22px; background: #0d0d0d; border-radius: 11px; z-index: 20;
}
.phone-status {
  display: flex; justify-content: space-between;
  padding: 14px 20px 4px;
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.55);
  position: relative; z-index: 5;
}
.phone-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* step indicator dots */
.phone-steps {
  display: flex; gap: 5px; justify-content: center; flex-wrap: wrap;
  padding: 0 4px;
}
.phone-step-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.12); cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.phone-step-dot.active { background: var(--ca); transform: scale(1.3); }
.phone-step-dot.done { background: rgba(0,214,79,0.4); }

/* ── NARRATIVE ── */
.narrative { padding-top: 4px; }
.step-counter {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--line);
  padding: 6px 14px 6px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700; color: var(--muted2);
  letter-spacing: 0.5px; margin-bottom: 20px; text-transform: uppercase;
}
.step-counter-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ca); }
.narrative h1 {
  font-size: 36px; font-weight: 800; color: var(--white);
  letter-spacing: -1px; line-height: 1.1; margin-bottom: 16px;
}
.narrative h1 em { font-style: normal; color: var(--ca); }
.narrative h1 .pe { font-style: normal; color: #A78BFA; }
.body-text {
  font-size: 15px; color: var(--text2); line-height: 1.7;
  margin-bottom: 24px; max-width: 520px; font-weight: 400;
}
.body-text strong { color: var(--text); font-weight: 600; }
.body-text em { font-style: normal; color: var(--ca); font-weight: 600; }

/* polygon layer */
.poly-card {
  background: rgba(123,63,228,0.07); border: 1px solid rgba(123,63,228,0.18);
  border-radius: 14px; padding: 16px 18px; margin-bottom: 22px; max-width: 520px;
}
.poly-card-label {
  font-size: 9px; font-weight: 700; color: #A78BFA;
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.poly-hex {
  width: 16px; height: 16px; background: var(--poly); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: white; font-weight: 800;
}
.poly-card-text { font-size: 13px; color: #C4B5FD; line-height: 1.55; }
.poly-card-text strong { color: #DDD6FE; font-weight: 600; }

/* detail bullets */
.bullets { list-style: none; max-width: 520px; margin-bottom: 8px; }
.bullets li {
  font-size: 13px; color: var(--text2); padding: 8px 0;
  border-bottom: 1px solid var(--line2);
  display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
}
.bullets li:last-child { border-bottom: none; }
.bullets li::before { content: '→'; color: var(--ca); font-weight: 700; flex-shrink: 0; margin-top: 1px; font-size: 12px; }
.bullets li strong { color: var(--text); font-weight: 600; }

/* controls */
.controls {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 32px; max-width: 520px;
}
.ctrl-btn {
  background: rgba(255,255,255,0.05); border: 1px solid var(--line);
  padding: 11px 22px; border-radius: 100px;
  font-size: 13px; font-weight: 700; color: var(--text);
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all 0.15s; letter-spacing: -0.2px;
}
.ctrl-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
.ctrl-btn.primary { background: var(--ca); color: var(--ink); border-color: var(--ca); }
.ctrl-btn.primary:hover:not(:disabled) { background: var(--ca2); }
.ctrl-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.reset-btn {
  background: none; border: none; color: var(--muted);
  font-size: 12px; cursor: pointer; font-family: 'Outfit', sans-serif;
  letter-spacing: 0.3px;
}
.reset-btn:hover { color: var(--muted2); }

/* ── PHONE SCREEN COMPONENTS ── */

/* home screen — matches real Cash App: pure black, large centered balance, bottom nav */
.ps-home {
  background: #000; display: flex; flex-direction: column;
  height: 100%; position: relative;
}
.ps-home-topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 14px 8px;
}
.ps-home-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ca); display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 900; color: #000;
}
.ps-home-notif {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.ps-home-balance-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 12px 14px 0;
}
.ps-home-bal-label {
  font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 500;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
}
.ps-home-bal {
  font-size: 52px; font-weight: 900; color: white;
  letter-spacing: -3px; line-height: 1; margin-bottom: 3px;
}
.ps-home-bal-sub {
  font-size: 8px; color: var(--ca); font-weight: 600;
  letter-spacing: 0.3px; margin-bottom: 18px;
}
/* Pay / Request pill buttons */
.ps-home-cta {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.ps-home-cta-btn {
  flex: 1; background: rgba(255,255,255,0.08);
  border-radius: 100px; padding: 9px 12px;
  text-align: center; font-size: 11px; font-weight: 800; color: white;
}
.ps-home-cta-btn.green { background: var(--ca); color: #000; }
/* Recent activity */
.ps-home-activity { width: 100%; }
.ps-activity-label {
  font-size: 7.5px; font-weight: 700; color: rgba(255,255,255,0.25);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px;
  padding: 0 2px;
}
.ps-txn-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 2px; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ps-txn-row:last-child { border-bottom: none; }
.ps-txn-ic {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0; background: rgba(255,255,255,0.07);
}
.ps-txn-tx { flex: 1; }
.ps-txn-name { font-size: 9.5px; font-weight: 700; color: white; }
.ps-txn-sub { font-size: 7.5px; color: rgba(255,255,255,0.3); }
.ps-txn-amt { font-size: 10px; font-weight: 700; }
/* Bottom nav */
.ps-bottom-nav {
  background: #000; border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center;
  padding: 8px 0 12px;
}
.ps-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; font-size: 7px; font-weight: 700;
  color: rgba(255,255,255,0.3);
}
.ps-nav-item.active { color: white; }
.ps-nav-icon { font-size: 16px; display: block; }

/* shared header — dark true black */
.ps-hdr {
  padding: 7px 14px 9px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: #000;
}
.ps-back {
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(255,255,255,0.08); display: flex; align-items: center;
  justify-content: center; font-size: 12px; color: rgba(255,255,255,0.5);
}
.ps-title { font-size: 13px; font-weight: 800; color: white; flex: 1; text-align: center; margin-right: 24px; letter-spacing: -0.2px; }
.ps-sb { flex: 1; padding: 12px 14px; overflow: hidden; background: #000; }

/* legacy classes still used by other screens */
.ps-body { flex: 1; background: #000; padding: 10px 14px; overflow: hidden; }
.ps-section-label {
  font-size: 7.5px; font-weight: 700; color: rgba(255,255,255,0.25);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px;
}
.ps-asset-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.ps-asset-row:last-child { border-bottom: none; }
.ps-ai {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 800; flex-shrink: 0;
}
.ps-at { flex: 1; }
.ps-at-name { font-size: 9.5px; font-weight: 700; color: white; }
.ps-at-sub { font-size: 7.5px; color: rgba(255,255,255,0.3); }
.ps-av { text-align: right; }
.ps-av-val { font-size: 10px; font-weight: 700; color: white; }
.ps-av-chg { font-size: 7.5px; color: var(--ca); }

/* menu items */
.ps-mi {
  background: rgba(255,255,255,0.04); border-radius: 11px;
  padding: 9px 11px; margin-bottom: 5px;
  display: flex; align-items: center; gap: 8px;
}
.ps-mi.sel { background: rgba(0,214,79,0.07); border: 1px solid rgba(0,214,79,0.18); }
.ps-mi-ic {
  width: 27px; height: 27px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
}
.ps-mi-tx { flex: 1; }
.ps-mi-name { font-size: 9.5px; font-weight: 700; color: white; }
.ps-mi-sub { font-size: 7.5px; color: rgba(255,255,255,0.3); margin-top: 0.5px; }
.ps-mi-arr { color: rgba(255,255,255,0.2); font-size: 11px; }
.ps-badge {
  font-size: 7px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
}
.ps-badge.g { background: rgba(0,214,79,0.14); color: var(--ca); }
.ps-badge.p { background: rgba(123,63,228,0.18); color: #A78BFA; }
.ps-badge.a { background: rgba(245,158,11,0.14); color: #FCD34D; }

/* fields */
.ps-fl { margin-bottom: 9px; }
.ps-fl-lbl {
  font-size: 7.5px; font-weight: 700; color: rgba(255,255,255,0.3);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px;
}
.ps-fl-val {
  background: rgba(255,255,255,0.05); border-radius: 8px;
  padding: 8px 10px; font-size: 9.5px; color: white; font-weight: 700;
}
.ps-fl-val.mono { font-family: 'DM Mono', monospace; font-size: 8.5px; }
.ps-fl-help { font-size: 7.5px; color: #A78BFA; margin-top: 2px; font-weight: 600; }
.ps-fl-helpg { font-size: 7.5px; color: var(--ca); margin-top: 2px; font-weight: 600; }

/* auth */
.ps-auth-top {
  background: #000;
  padding: 28px 14px 20px; text-align: center;
}
.ps-auth-logo {
  width: 46px; height: 46px; background: var(--ca); border-radius: 13px;
  margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: var(--ink);
}
.ps-auth-title { font-size: 14px; font-weight: 800; color: white; margin-bottom: 3px; letter-spacing: -0.3px; }
.ps-auth-sub { font-size: 8.5px; color: rgba(255,255,255,0.35); font-weight: 500; }
.ps-auth-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 11px; padding: 10px 12px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 9px;
}
.ps-auth-btn-ic {
  width: 25px; height: 25px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.ps-auth-btn-tx { font-size: 9.5px; font-weight: 700; color: white; flex: 1; }
.ps-auth-btn-arr { color: rgba(255,255,255,0.2); font-size: 11px; }
.ps-divider {
  text-align: center; font-size: 7.5px; color: rgba(255,255,255,0.2);
  margin: 7px 0; position: relative;
}
.ps-divider::before, .ps-divider::after {
  content: ''; position: absolute; top: 50%;
  width: 33%; height: 1px; background: rgba(255,255,255,0.06);
}
.ps-divider::before { left: 0; }
.ps-divider::after { right: 0; }
.ps-note-p {
  background: rgba(123,63,228,0.08); border: 1px solid rgba(123,63,228,0.15);
  border-radius: 8px; padding: 8px 9px;
  font-size: 7.5px; color: #C4B5FD; line-height: 1.5; margin-top: 7px;
}
.ps-note-g {
  background: rgba(0,214,79,0.05); border: 1px solid rgba(0,214,79,0.12);
  border-radius: 8px; padding: 8px 9px;
  font-size: 7.5px; color: rgba(0,214,79,0.7); line-height: 1.5;
}

/* confirm */
.ps-confirm { text-align: center; padding: 8px 0 10px; }
.ps-check {
  width: 52px; height: 52px; background: var(--ca); border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--ink); margin-bottom: 8px; font-weight: 900;
}
.ps-conf-amt { font-size: 26px; font-weight: 900; color: white; letter-spacing: -1px; }
.ps-conf-sub { font-size: 8.5px; color: rgba(255,255,255,0.35); margin-top: 2px; font-weight: 500; }
.ps-receipt {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 9px; margin-top: 10px;
}
.ps-rrow {
  display: flex; justify-content: space-between; padding: 4px 0;
  font-size: 8px; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.ps-rrow:last-child { border-bottom: none; }
.ps-rl { color: rgba(255,255,255,0.3); font-weight: 500; }
.ps-rv { color: white; font-weight: 700; }

/* processing steps */
.ps-steps { display: flex; flex-direction: column; gap: 10px; }
.ps-step { display: flex; gap: 8px; align-items: flex-start; opacity: 0.25; transition: opacity 0.3s; }
.ps-step.active { opacity: 1; }
.ps-step.done { opacity: 1; }
.ps-sd {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(255,255,255,0.07); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.3s;
}
.ps-step.active .ps-sd { background: var(--poly); animation: spulse 1.4s infinite; }
.ps-step.done .ps-sd { background: var(--ca); }
.ps-sdi { width: 6px; height: 6px; background: rgba(255,255,255,0.25); border-radius: 50%; }
.ps-step.active .ps-sdi { background: white; }
.ps-step.done .ps-sdi { background: transparent; position: relative; width: 9px; height: 9px; border-radius: 0; }
.ps-step.done .ps-sdi::after {
  content: ''; position: absolute; width: 3px; height: 6px;
  border: solid white; border-width: 0 2px 2px 0;
  top: -1px; left: 2px; transform: rotate(45deg);
}
@keyframes spulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(123,63,228,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(123,63,228,0); }
}
.ps-sname { font-size: 9px; font-weight: 700; color: white; }
.ps-sdet { font-size: 7.5px; color: rgba(255,255,255,0.3); margin-top: 1px; line-height: 1.4; }
.ps-ptitle { font-size: 12px; font-weight: 800; color: white; text-align: center; margin-bottom: 3px; letter-spacing: -0.3px; }
.ps-psub { font-size: 8px; color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 14px; }

/* yield */
.ps-yield-card {
  background: rgba(0,214,79,0.06);
  border: 1px solid rgba(0,214,79,0.14); border-radius: 13px;
  padding: 13px; margin-bottom: 9px;
}
.ps-yield-badge {
  display: inline-block; background: var(--ca); color: var(--ink);
  font-size: 7px; font-weight: 800; padding: 2px 7px; border-radius: 4px;
  margin-bottom: 7px; letter-spacing: 0.3px;
}
.ps-yield-rate { font-size: 32px; font-weight: 900; color: white; letter-spacing: -1.5px; line-height: 1; }
.ps-yield-lbl { font-size: 8px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.ps-yield-det { font-size: 7.5px; color: rgba(0,214,79,0.65); margin-top: 6px; font-weight: 500; }
.ps-bal-row {
  background: rgba(255,255,255,0.03); border-radius: 9px;
  padding: 9px; margin-bottom: 7px;
}
.ps-bar-track {
  height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px;
  margin-top: 7px; overflow: hidden;
}
.ps-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(to right, var(--ca), #00ff88); }

/* buidl */
.ps-mmf-card {
  background: linear-gradient(135deg, #09090f, #0d1020);
  border: 1px solid rgba(59,130,246,0.18); border-radius: 13px;
  padding: 13px; margin-bottom: 9px;
}
.ps-mmf-logo { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.ps-mmf-logo-box {
  width: 27px; height: 27px; background: #1E3A8A; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: white;
}
.ps-mmf-title { font-size: 10.5px; font-weight: 800; color: white; }
.ps-mmf-sub { font-size: 7.5px; color: rgba(255,255,255,0.3); }
.ps-mmf-rate { font-size: 30px; font-weight: 900; color: #93C5FD; letter-spacing: -1px; }
.ps-mmf-rl { font-size: 8px; color: rgba(255,255,255,0.3); }
.ps-mmf-row { display: flex; gap: 6px; margin-top: 9px; }
.ps-mmf-stat {
  flex: 1; background: rgba(255,255,255,0.04); border-radius: 7px; padding: 7px;
  font-size: 7px; color: rgba(255,255,255,0.35);
}
.ps-mmf-stat span { display: block; font-size: 9.5px; font-weight: 700; color: white; margin-top: 1px; }

/* loan */
.ps-loan-card {
  background: rgba(255,255,255,0.03); border: 1px solid var(--line);
  border-radius: 13px; padding: 13px; margin-bottom: 9px;
}
.ps-slider-track {
  height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px;
  position: relative; margin: 9px 0;
}
.ps-slider-fill { height: 100%; width: 55%; background: linear-gradient(to right, var(--poly), #A78BFA); border-radius: 2px; }
.ps-slider-thumb {
  width: 14px; height: 14px; background: white; border-radius: 50%;
  position: absolute; top: -5px; left: 55%; transform: translateX(-50%);
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* virtual account */
.ps-va-card {
  background: linear-gradient(135deg, #0c0e14, #141820);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 13px;
  padding: 13px; margin-bottom: 8px;
}
.ps-va-chip {
  background: rgba(0,214,79,0.1); border: 1px solid rgba(0,214,79,0.18);
  border-radius: 5px; padding: 2px 7px;
  font-size: 7px; font-weight: 700; color: var(--ca); display: inline-block; margin-right: 3px;
}

/* card */
.ps-card-vis {
  background: linear-gradient(135deg, #091409, #102010);
  border: 1px solid rgba(0,214,79,0.18); border-radius: 13px;
  padding: 15px; margin-bottom: 9px; position: relative; overflow: hidden;
}
.ps-card-vis::before {
  content: ''; position: absolute; top: -20px; right: -20px;
  width: 70px; height: 70px;
  background: radial-gradient(circle, rgba(0,214,79,0.12) 0%, transparent 70%);
}

/* key management */
.ps-key-wrap {
  background: rgba(255,255,255,0.02); border: 1px solid var(--line2);
  border-radius: 11px; padding: 10px; margin-bottom: 9px;
}
.ps-key-row { display: flex; gap: 5px; margin-bottom: 5px; }
.ps-key-box {
  flex: 1; background: rgba(123,63,228,0.09); border: 1px solid rgba(123,63,228,0.18);
  border-radius: 7px; padding: 7px; font-size: 7px; color: #C4B5FD; text-align: center;
}
.ps-key-box b { display: block; font-size: 8px; color: #DDD6FE; margin-bottom: 2px; }

/* primary btn */
.ps-btn {
  background: var(--ca); color: var(--ink); border-radius: 100px;
  padding: 10px; text-align: center; font-size: 10.5px; font-weight: 800;
  cursor: pointer; border: none; width: 100%;
  font-family: 'Outfit', sans-serif; margin-top: 6px; letter-spacing: -0.2px;
}

/* chain pills */
.cp { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 9px; }
.cp-item {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px; padding: 3px 7px;
  font-size: 7.5px; font-weight: 700; color: rgba(255,255,255,0.5);
  display: inline-flex; align-items: center; gap: 3px;
}
.cdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cdot.po { background: var(--poly); }
.cdot.et { background: #627EEA; }
.cdot.so { background: #9945FF; }
.cdot.tr { background: #FF060A; }

/* ── FOOTER ── */
.page-footer {
  padding: 40px 48px; border-top: 1px solid var(--line2);
  text-align: center; font-size: 11px; color: var(--muted); font-weight: 500;
}
.page-footer strong { color: rgba(255,255,255,0.4); }

@media(max-width:900px){
  .demo-grid { grid-template-columns: 1fr; }
  .phone-wrap { position: static; margin-bottom: 36px; }
  .page-wrap { padding: 40px 20px 60px; }
  .banner { padding: 14px 20px; }
  .narrative h1 { font-size: 28px; }
}

  const el = document.getElementById('step-dots');
  el.innerHTML = '';
  STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'phone-step-dot' + (i < cur ? ' done' : '') + (i === cur ? ' active' : '');
    d.onclick = () => { cur = i; render(); };
    el.appendChild(d);
  });
}

function render() {
  const s = STEPS[cur];
  document.getElementById('step-counter-text').textContent = `${s.tag}`;
  document.getElementById('step-title').innerHTML = s.title;
  document.getElementById('step-body').innerHTML = s.body;
  document.getElementById('poly-label').textContent = s.polyLabel;
  document.getElementById('poly-text').innerHTML = s.polyText;
  document.getElementById('step-bullets').innerHTML = s.bullets.map(b => `<li>${b}</li>`).join('');
  document.getElementById('phone-content').innerHTML = SCREENS[s.screen]();
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === N - 1;
  document.getElementById('next-btn').textContent = cur === N - 1 ? 'Done' : 'Next →';
  buildDots();
  // bridge animation
  if (s.screen === 'bridge') {
    setTimeout(() => animateSteps('bridge-steps'), 200);
  }
}

function animateSteps(id) {
  const c = document.getElementById(id);
  if (!c) return;
  const items = c.querySelectorAll('.ps-step');
  items.forEach((item, i) => {
    setTimeout(() => {
      if (i > 0) { items[i-1].classList.remove('active'); items[i-1].classList.add('done'); }
      item.classList.add('active');
    }, i * 750);
  });
  setTimeout(() => { items[items.length-1].classList.remove('active'); items[items.length-1].classList.add('done'); }, items.length * 750);
}

document.getElementById('next-btn').addEventListener('click', () => { if (cur < N-1) { cur++; render(); window.scrollTo({top:0,behavior:'smooth'}); } });
document.getElementById('prev-btn').addEventListener('click', () => { if (cur > 0) { cur--; render(); } });
document.getElementById('reset-btn').addEventListener('click', () => { cur = 0; render(); window.scrollTo({top:0,behavior:'smooth'}); });

render();
</script>
</body>
</html>
